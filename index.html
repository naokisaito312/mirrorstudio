<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダンス練習用・カメラ＆YouTube重ね合わせ</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* 1. カメラ映像（最背面） */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1); /* ミラー表示 */
            z-index: 1;
        }

        /* 2. YouTubeプレイヤー（前面・半透明） */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.5;
            pointer-events: none; /* クリックをすり抜けさせて下のコントロールを触らせる */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 3. 操作パネル（最前面） */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0, 0, 0, 0.85); /* 少し濃くして見やすく */
            padding: 15px 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column; /* 2段構成にする */
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 上段：URL入力エリア */
        .controls-top {
            display: flex;
            gap: 10px;
        }
        .controls input[type="text"] {
            width: 250px;
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
        }
        .controls .btn-load {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background-color: #ff0000;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* 下段：動画操作ボタン＆スライダー */
        .controls-bottom {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn-player {
            padding: 6px 14px;
            border-radius: 15px;
            border: 1px solid #fff;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-player:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .controls label {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <div class="controls">
        <div class="controls-top">
            <input type="text" id="youtubeUrl" placeholder="YouTubeのURLまたは動画IDを入力">
            <button class="btn-load" onclick="loadVideo()">動画を読み込み</button>
        </div>
        
        <div class="controls-bottom">
            <button class="btn-player" onclick="skip(-10)">◀ 10秒戻る</button>
            <button class="btn-player" id="playPauseBtn" onclick="togglePlay()">一時停止</button>
            <button class="btn-player" onclick="skip(10)">10秒進む ▶</button>
            
            <label>
                動画の薄さ:
                <input type="range" id="opacitySlider" min="0.1" max="0.9" step="0.05" value="0.5" oninput="changeOpacity(this.value)">
            </label>
        </div>
    </div>

    <script>
        // --- 1. カメラ初期化 ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 3840 }, height: { ideal: 2160 } },
                    audio: false
                });
                document.getElementById('webcam').srcObject = stream;
            } catch (error) {
                console.error('カメラの取得に失敗しました:', error);
            }
        }
        window.addEventListener('DOMContentLoaded', initCamera);


        // --- 2. YouTube IFrame Player API の読み込み ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'dQw4w9WgXcQ', // 初期動画
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,       // ブラウザの自動再生ポリシー対策でミュート開始
                    'controls': 0,   // ★純正コントロールはクリックできないので非表示に
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // --- 3. アプリの操作ロジック ---
        
        // URLから動画IDを抽出して読み込む
        function loadVideo() {
            const input = document.getElementById('youtubeUrl').value;
            let videoId = input;

            if (input.includes('v=')) {
                videoId = input.split('v=')[1].split('&')[0];
            } else if (input.includes('youtu.be/')) {
                videoId = input.split('youtu.be/')[1].split('?')[0];
            }

            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById({ videoId: videoId });
                // 新しい動画を読み込んだらミュートを解除（任意）
                player.unMute(); 
            } else {
                alert('有効なYouTubeのURLを入力してください。');
            }
        }

        // 再生 / 一時停止の切り替え
        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        // 動画の状態が変わったときにボタンのテキストを変更する
        function onPlayerStateChange(event) {
            const btn = document.getElementById('playPauseBtn');
            if (event.data === YT.PlayerState.PLAYING) {
                btn.innerText = "一時停止";
            } else {
                btn.innerText = "再生";
            }
        }

        // スキップ（戻る・進む）機能
        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            
            const currentTime = player.getCurrentTime();
            player.seekTo(currentTime + seconds, true);
        }

        // 透明度変更
        function changeOpacity(value) {
            document.querySelector('.video-container').style.opacity = value;
        }
    </script>
</body>
</html>
