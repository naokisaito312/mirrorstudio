<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT-inspired Dance Mirror App</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b071e; /* 深い神秘的な夜空のようなパープルブラック */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. カメラ映像（最背面） */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1); /* ミラー表示 */
            z-index: 1;
        }

        /* 2. YouTubeプレイヤー（前面・半透明） */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.5;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .video-container.mirrored {
            transform: scaleX(-1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 3. ILLIT風操作パネル（最前面） */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            
            /* グラスモフィズム：透明感のある背景とボケ効果 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            
            padding: 20px 30px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            
            /* ILLITのドリーミーな光を表現するオーラのような影 */
            box-shadow: 0 8px 32px 0 rgba(190, 145, 255, 0.2),
                        inset 0 0 12px rgba(255, 255, 255, 0.2);
        }

        /* 上段：URL入力エリア */
        .controls-top {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        
        .controls input[type="text"] {
            flex: 1;
            width: 280px;
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        /* 入力欄にフォーカスした時、ほんのり光る */
        .controls input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffc2eb;
            box-shadow: 0 0 10px rgba(255, 194, 235, 0.5);
        }
        
        .controls input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* パステルグラデーションボタン */
        .btn-load {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #ffb3e6, #b3e6ff); /* ゆめかわパステルグラデーション */
            color: #4a2a6b;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 179, 230, 0.4);
            transition: all 0.3s ease;
        }
        .btn-load:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(255, 179, 230, 0.6);
            opacity: 0.9;
        }

        /* 下段：コントロール */
        .controls-bottom {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
            justify-content: center;
        }

        /* 標準ボタン */
        .btn-player {
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .btn-player:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.7);
        }
        
        /* YouTube反転ボタン（ホログラムネオン風） */
        .btn-player.btn-flip {
            background: linear-gradient(135deg, #c2b3ff, #ffb3e6);
            border: none;
            color: #3b2457;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(194, 179, 255, 0.4);
        }
        .btn-player.btn-flip:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(194, 179, 255, 0.6);
        }

        /* スライダー周り */
        .controls label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
        }

        /* カスタムスライダー（シースルーピンク） */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            outline: none;
            width: 100px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffc2eb;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(255, 194, 235, 1);
            transition: transform 0.1s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div class="video-container" id="videoContainer">
        <div id="player"></div>
    </div>

    <div class="controls">
        <div class="controls-top">
            <input type="text" id="youtubeUrl" placeholder="YouTubeのURLまたは動画IDを入力...">
            <button class="btn-load" onclick="loadVideo()">LOAD</button>
        </div>
        
        <div class="controls-bottom">
            <button class="btn-player" onclick="skip(-10)">◀ 10s</button>
            <button class="btn-player" id="playPauseBtn" onclick="togglePlay()">PAUSE</button>
            <button class="btn-player" onclick="skip(10)">10s ▶</button>
            
            <button class="btn-player btn-flip" onclick="toggleYoutubeMirror()">MIRROR</button>
            
            <label>
                OPACITY:
                <input type="range" id="opacitySlider" min="0.1" max="0.9" step="0.05" value="0.5" oninput="changeOpacity(this.value)">
            </label>
        </div>
    </div>

    <script>
        // --- 1. カメラ初期化 ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 3840 }, height: { ideal: 2160 } },
                    audio: false
                });
                document.getElementById('webcam').srcObject = stream;
            } catch (error) {
                console.error('カメラの取得に失敗しました:', error);
            }
        }
        window.addEventListener('DOMContentLoaded', initCamera);


        // --- 2. YouTube IFrame Player API の読み込み ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'ZKu7R-8-F-U', // ILLITの「Magnetic」のMVなどを入れるとより雰囲気が出ます
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // --- 3. アプリの操作ロジック ---
        function loadVideo() {
            const input = document.getElementById('youtubeUrl').value;
            let videoId = input;

            if (input.includes('v=')) {
                videoId = input.split('v=')[1].split('&')[0];
            } else if (input.includes('youtu.be/')) {
                videoId = input.split('youtu.be/')[1].split('?')[0];
            }

            if (videoId && player && typeof player.loadVideoById === 'function') {
                player.loadVideoById({ videoId: videoId });
                player.unMute(); 
            } else {
                alert('有効なYouTubeのURLを入力してください。');
            }
        }

        function togglePlay() {
            if (!player || typeof player.getPlayerState !== 'function') return;
            
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('playPauseBtn');
            if (event.data === YT.PlayerState.PLAYING) {
                btn.innerText = "PAUSE";
            } else {
                btn.innerText = "PLAY";
            }
        }

        document.addEventListener('keydown', (event) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (event.code === 'Space') {
                event.preventDefault();
                togglePlay();
            }
        });

        function skip(seconds) {
            if (!player || typeof player.getCurrentTime !== 'function') return;
            const currentTime = player.getCurrentTime();
            player.seekTo(currentTime + seconds, true);
        }

        function toggleYoutubeMirror() {
            const container = document.getElementById('videoContainer');
            container.classList.toggle('mirrored');
        }

        function changeOpacity(value) {
            document.getElementById('videoContainer').style.opacity = value;
        }
    </script>
</body>
</html>
